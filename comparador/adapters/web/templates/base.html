<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1120">
<title>{% block title %}Comparador de Preços{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&family=Azeret+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="masthead">
  <a href="/public/" class="wordmark">Comparador<em>/Pre&ccedil;os</em></a>
  <nav>
    {% if is_admin %}
      <a href="/admin/">Admin</a>
      <a href="/admin/logout" class="logout">Sair</a>
    {% else %}
      <a href="/admin/login">Entrar</a>
    {% endif %}
  </nav>
</header>
<div class="tickbar" aria-hidden="true"></div>

<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
